  flutter_svg: ^2.0.17
  flutter_datetime_picker_plus: ^2.2.0
  #google_sign_in: ^6.3.0
  #flutter_facebook_auth: ^7.1.1
  dartz: ^0.10.1
  easy_localization: ^3.0.7+1
  path_provider: ^2.1.5
  flutter_screenutil: ^5.9.3
  go_router: ^16.2.4
