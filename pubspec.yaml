  #storage
  sqflite: ^2.4.2

  #analezy


  #ui
  skeletonizer:
  lottie: ^3.3.1
  photo_view: ^0.15.0
  dots_indicator: ^4.0.1
  pinput: ^5.0.1
  flutter_local_notifications: ^19.4.2
  like_button: ^2.1.0
  scroll_to_top: ^0.0.5
  loading_animation_widget: ^1.3.0

  #map
  flutter_map_marker_cluster: ^8.2.2
  yandex_geocoder: ^2.3.1
  yandex_mapkit: ^4.2.1


  #helpers
  image_picker: ^1.1.2
  mask_text_input_formatter: ^2.9.0
  file_picker: ^10.1.9
  open_file: ^3.5.10
  mime_type: ^1.0.1
  pretty_dio_logger: ^1.4.0
  permission_handler: ^12.0.1
  smart_auth: ^3.2.0
  sentry: ^9.4.1
  flutter_card_swiper: ^7.0.2
  app_links: ^6.4.0
  flutter_native_splash: ^2.4.6
  path: ^1.9.1
  firebase_messaging: ^16.0.1
  firebase_core: ^4.1.0
  device_info_plus: ^12.1.0
  logger: ^2.6.1
  new_version_plus: ^0.1.1

  # animations
  animate_do: ^4.2.0
  percent_indicator: ^4.2.5
  animated_text_kit: ^4.2.3
  animations: ^2.0.11
  circle_splash: ^1.0.2


  # internet
  web_socket_channel: ^3.0.3
  rename_app: ^1.6.5


  #generators
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0

dev_dependencies:
  sentry_dart_plugin: ^3.1.1
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.3
  freezed: ^3.0.6
  change_app_package_name: ^1.5.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/img/ishbor.png"


  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true
  fonts:
    - family: fontBold
      fonts:
        - asset: assets/fonts/Arimo-Bold.ttf
          weight: 700
    - family: fontMedium
      fonts:
        - asset: assets/fonts/Arimo-Medium.ttf
          weight: 500
    - family: fontLight
      fonts:
        - asset: assets/fonts/Arimo-Medium.ttf
          weight: 400
    - family: fontRoman
      fonts:
        - asset: assets/fonts/HelveticaNeueCyr-Roman.ttf
    - family: fontNorms
      fonts:
        - asset: assets/fonts/TTNorms-Medium.otf
          weight: 500
    - family: fontSFProRegular
      fonts:
        - asset: assets/fonts/SFPRODISPLAYREGULAR.OTF
          weight: 400
    - family: fontSFProMedium
      fonts:
        - asset: assets/fonts/SFPRODISPLAYMEDIUM.OTF
          weight: 500
    - family: fontSFProBold
      fonts:
        - asset: assets/fonts/SFPRODISPLAYBOLD.OTF
          weight: 700
    - family: fontMontserrat
      fonts:
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 900


  assets:
    - assets/img/
    - assets/svg/
    - assets/fonts/
    - assets/translations/
    - assets/lottie/

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: ishbor

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#FFFFFF"
  #  image: assets/png/logo.png
  #  image_dark: assets/png/logo.png
  android: true
  ios: true